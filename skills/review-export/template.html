<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{BRANCH}} @ {{COMMIT}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Berkeley Mono';
      src: local('Berkeley Mono'), local('BerkeleyMono-Regular');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Berkeley Mono';
      src: local('Berkeley Mono Bold'), local('BerkeleyMono-Bold');
      font-weight: 600;
    }

    :root {
      --bg-deep: #09090b;
      --bg-base: #0c0c0e;
      --bg-elevated: #141417;
      --bg-hover: #1a1a1f;
      --border-subtle: rgba(255,255,255,0.06);
      --border-medium: rgba(255,255,255,0.1);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-tertiary: #52525b;
      --accent: #3b82f6;
      --accent-muted: rgba(59,130,246,0.15);
      --bug: #ef4444;
      --bug-muted: rgba(239,68,68,0.15);
      --warning: #f59e0b;
      --warning-muted: rgba(245,158,11,0.15);
      --suggestion: #8b5cf6;
      --suggestion-muted: rgba(139,92,246,0.15);
      --good: #10b981;
      --good-muted: rgba(16,185,129,0.15);
      --comment: #38bdf8;
      --comment-muted: rgba(56,189,248,0.15);
      --font-sans: 'Inter', -apple-system, sans-serif;
      --font-mono: 'Berkeley Mono', 'SF Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-sans); background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border-subtle);
      padding: 16px 32px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .export-btn {
      margin-left: auto;
      padding: 6px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }

    .export-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .export-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .export-btn.copied {
      background: var(--good-muted);
      border-color: var(--good);
      color: var(--good);
    }

    .branch {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent);
      background: var(--accent-muted);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .commit {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    .stats {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .stat {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .stat.bug { background: var(--bug-muted); color: var(--bug); }
    .stat.warning { background: var(--warning-muted); color: var(--warning); }
    .stat.suggestion { background: var(--suggestion-muted); color: var(--suggestion); }
    .stat.zero { opacity: 0.4; }

    .summary {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Main */
    .main {
      padding: 24px 32px 80px;
    }

    .file-section {
      margin-bottom: 32px;
    }

    .file-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 6px 6px 0 0;
      border-bottom: none;
      cursor: pointer;
      user-select: none;
    }

    .file-header:hover {
      background: var(--bg-hover);
    }

    .file-section.collapsed .file-header {
      border-radius: 6px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .file-section.collapsed .diff-container {
      display: none;
    }

    .file-header .toggle {
      color: var(--text-tertiary);
      font-size: 0.75rem;
      margin-right: 8px;
    }

    .file-header .path {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .file-header .changes {
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    .file-header .add { color: var(--good); }
    .file-header .del { color: var(--bug); }

    .diff-container {
      border: 1px solid var(--border-subtle);
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      background: var(--bg-base);
    }

    /* Annotations */
    .annotation {
      margin: 8px 16px 12px 48px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 6px;
      overflow: hidden;
    }

    .annotation-comment {
      padding: 12px 16px;
    }

    .annotation-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .annotation-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .annotation-badge.bug { background: var(--bug-muted); color: var(--bug); }
    .annotation-badge.warning { background: var(--warning-muted); color: var(--warning); }
    .annotation-badge.suggestion { background: var(--suggestion-muted); color: var(--suggestion); }
    .annotation-badge.good { background: var(--good-muted); color: var(--good); }
    .annotation-badge.info { background: var(--accent-muted); color: var(--accent); }
    .annotation-badge.comment { background: var(--comment-muted); color: var(--comment); }

    .annotation-text {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .annotation-actions {
      display: flex;
      padding: 6px 16px;
      background: var(--bg-hover);
      border-top: 1px solid var(--border-subtle);
    }

    .annotation-action {
      font-size: 0.75rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }

    .annotation-action:hover { text-decoration: underline; }

    .resolve-btn {
      font-size: 0.75rem;
      color: var(--text-secondary);
      cursor: pointer;
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: inherit;
    }
    .resolve-btn:hover {
      background: var(--good-muted);
      border-color: var(--good);
      color: var(--good);
    }

    /* Reply input */
    .annotation-reply-form {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-base);
      border-top: 1px solid var(--border-subtle);
    }

    .annotation-reply-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 0.8rem;
      font-family: inherit;
      resize: none;
    }

    .annotation-reply-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .annotation-reply-input::placeholder {
      color: var(--text-tertiary);
    }

    .annotation-reply-btn {
      padding: 6px 12px;
      background: var(--accent-muted);
      border: none;
      border-radius: 4px;
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .annotation-reply-btn:hover {
      background: var(--accent);
      color: white;
    }

    /* User comments shown in thread */
    .user-comment {
      padding: 8px 16px;
      background: var(--bg-base);
      border-top: 1px solid var(--border-subtle);
      font-size: 0.8rem;
    }

    .user-comment-header {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .user-comment-text {
      color: var(--text-primary);
    }

    /* Collapsed */
    .annotation.resolved {
      margin: 2px 16px 2px 48px;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .annotation.resolved .annotation-comment,
    .annotation.resolved .annotation-actions,
    .annotation.resolved .annotation-reply-form,
    .annotation.resolved .user-comments-container { display: none; }

    .annotation.resolved .annotation-collapsed {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      font-size: 0.65rem;
      color: var(--text-tertiary);
      opacity: 0.5;
    }
    .annotation.resolved .annotation-collapsed .annotation-badge {
      font-size: 0.6rem;
      padding: 1px 4px;
      opacity: 0.6;
    }
    .annotation.resolved .annotation-collapsed span:last-child {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .annotation.resolved:hover .annotation-collapsed { opacity: 1; }
    .annotation:not(.resolved) .annotation-collapsed { display: none; }

    /* Comment modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      padding: 20px;
      width: 500px;
      max-width: 90vw;
    }

    .modal-title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .modal-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-deep);
      border: 1px solid var(--border-medium);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-btn {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      border: none;
    }

    .modal-btn-cancel {
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    .modal-btn-submit {
      background: var(--accent);
      color: white;
    }

    .modal-btn:hover {
      opacity: 0.9;
    }

    /* Keyboard hints */
    .hints {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 12px;
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--text-tertiary);
    }

    .hints kbd {
      padding: 2px 5px;
      background: var(--bg-hover);
      border-radius: 3px;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <span class="branch">{{BRANCH}}</span>
      <span class="commit">{{COMMIT}}</span>
      <div class="stats">
        <span class="stat bug {{BUG_ZERO}}">{{BUG_COUNT}} bugs</span>
        <span class="stat warning {{WARNING_ZERO}}">{{WARNING_COUNT}} warnings</span>
        <span class="stat suggestion {{SUGGESTION_ZERO}}">{{SUGGESTION_COUNT}} suggestions</span>
      </div>
      <button class="export-btn" id="export-btn" disabled>Export (0)</button>
    </div>
    <div class="summary" id="summary"></div>
  </header>

  <main class="main" id="main"></main>

  <div class="hints">
    <span><kbd>j</kbd>/<kbd>k</kbd> nav</span>
    <span><kbd>r</kbd> toggle</span>
    <span>click line to comment</span>
  </div>

  <div class="modal-overlay" id="comment-modal" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <textarea class="modal-input" id="modal-input" rows="3" placeholder="Your comment..."></textarea>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn modal-btn-submit" id="modal-submit">Add Comment</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { FileDiff, parsePatchFiles } from 'https://esm.sh/@pierre/diffs@1.0.2';

    const b64 = '{{REVIEW_DATA_B64}}';
    const DATA = JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(b64), c => c.charCodeAt(0))));

    const escapeHtml = (str) => String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    const ensureId = () => {
      if (globalThis.crypto?.randomUUID) return globalThis.crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    };

    // Show summary
    document.getElementById('summary').textContent = DATA.summary || '';

    // Resolved state - merge localStorage with any pre-resolved from DATA
    const storageKey = `review-resolved:${DATA.commit}`;
    const storedResolved = JSON.parse(localStorage.getItem(storageKey) || '[]');
    const dataResolved = DATA.resolved || [];
    const resolved = new Set([...storedResolved, ...dataResolved]);
    const save = () => localStorage.setItem(storageKey, JSON.stringify([...resolved]));
    
    // Check if a stableId is resolved (exact match or wildcard file:line: prefix)
    const isResolved = (stableId) => {
      if (resolved.has(stableId)) return true;
      // Check wildcard: file:line: matches file:line:type:text
      const parts = stableId.split(':');
      if (parts.length >= 2) {
        const wildcard = `${parts[0]}:${parts[1]}:`;
        if (resolved.has(wildcard)) return true;
      }
      return false;
    };

    // User comments
    const commentsKey = `review-comments:${DATA.commit}`;
    const userComments = JSON.parse(localStorage.getItem(commentsKey) || '[]');
    const exportBtn = document.getElementById('export-btn');

    const normalizeUserComments = () => {
      let changed = false;
      for (const c of userComments) {
        if (!c.id) { c.id = ensureId(); changed = true; }
        if (!c.createdAt) { c.createdAt = Date.now(); changed = true; }
        if (!c.side) { c.side = 'additions'; changed = true; }
      }
      if (changed) localStorage.setItem(commentsKey, JSON.stringify(userComments));
    };

    function updateExportBtn() {
      const count = userComments.length + resolved.size;
      exportBtn.textContent = `Export (${count})`;
      exportBtn.disabled = count === 0;
      exportBtn.classList.remove('copied');
    }

    function addUserComment(comment) {
      const normalized = {
        id: comment.id || ensureId(),
        createdAt: comment.createdAt || Date.now(),
        side: comment.side || 'additions',
        ...comment,
      };
      userComments.push(normalized);
      localStorage.setItem(commentsKey, JSON.stringify(userComments));
      updateExportBtn();
      return normalized;
    }

    function formatForClipboard() {
      let out = `Review comments for ${DATA.commit}:\n`;
      for (const c of userComments) {
        const side = c.side && c.side !== 'additions' ? ` (${c.side})` : '';
        out += `\n${c.file}:${c.line}${side}\n`;
        if (c.original) out += `> ${c.original}\n`;
        out += `${c.text}\n`;
      }
      return out;
    }

    function getExportData() {
      return {
        commit: DATA.commit,
        repo: DATA.repoRoot,
        branch: DATA.branch,
        comments: userComments,
        resolved: [...resolved],
      };
    }

    exportBtn.addEventListener('click', async () => {
      if (userComments.length === 0 && resolved.size === 0) return;

      const json = JSON.stringify(getExportData(), null, 2);
      await navigator.clipboard.writeText(json);

      exportBtn.textContent = 'Copied!';
      exportBtn.classList.add('copied');
      setTimeout(updateExportBtn, 2000);
    });

    normalizeUserComments();
    updateExportBtn();

    // Comment modal
    const modal = document.getElementById('comment-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalInput = document.getElementById('modal-input');
    const modalCancel = document.getElementById('modal-cancel');
    const modalSubmit = document.getElementById('modal-submit');
    let pendingComment = null;

    function showCommentModal(filePath, lineNum, side, rerender) {
      pendingComment = { file: filePath, line: lineNum, side: side || 'additions', rerender };
      modalTitle.textContent = `${filePath}:${lineNum}` + (side && side !== 'additions' ? ` (${side})` : '');
      modalInput.value = '';
      modal.style.display = 'flex';
      modalInput.focus();
    }

    function hideModal() {
      modal.style.display = 'none';
      pendingComment = null;
    }

    function submitModal() {
      const text = modalInput.value.trim();
      if (!text || !pendingComment) return;

      addUserComment({
        file: pendingComment.file,
        line: pendingComment.line,
        side: pendingComment.side,
        type: 'new',
        original: null,
        text: text,
      });

      pendingComment.rerender?.();
      hideModal();
    }

    modalCancel.addEventListener('click', hideModal);
    modalSubmit.addEventListener('click', submitModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });
    modalInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.metaKey) { e.preventDefault(); submitModal(); }
      if (e.key === 'Escape') hideModal();
    });

    const main = document.getElementById('main');
    const patches = parsePatchFiles(DATA.patch, 'review');
    const diffByPath = new Map(patches.flatMap(p => p.files).map(f => [f.name, f]));

    const getUserLineComments = (filePath) => userComments.filter(c => c.type === 'new' && c.file === filePath);
    const getUserRepliesForLine = (filePath, line) => userComments.filter(c => c.type === 'reply' && c.file === filePath && c.line === line);

    DATA.files.forEach((file, idx) => {
      const section = document.createElement('div');
      section.className = 'file-section';
      section.dataset.index = idx;
      section.innerHTML = `
        <div class="file-header">
          <span class="toggle">▼</span>
          <span class="path">${escapeHtml(file.path)}</span>
          <span class="changes"><span class="add">+${file.additions || 0}</span> <span class="del">-${file.deletions || 0}</span></span>
        </div>
        <div class="diff-container"></div>
      `;
      main.appendChild(section);

      // Toggle file collapse
      const header = section.querySelector('.file-header');
      const toggle = section.querySelector('.toggle');
      header.addEventListener('click', () => {
        section.classList.toggle('collapsed');
        toggle.textContent = section.classList.contains('collapsed') ? '▶' : '▼';
      });

      const diffContainer = section.querySelector('.diff-container');
      const fileDiff = diffByPath.get(file.path);

      if (!fileDiff) return;

      const renderDiff = () => {
        diffContainer.innerHTML = '';

        const allAnnotations = [];

        if (file.summary) {
          const firstAddLine = fileDiff.hunks?.[0]?.additionStart || 1;
          allAnnotations.push({
            side: 'additions',
            lineNumber: firstAddLine,
            metadata: { kind: 'summary', type: 'info', text: file.summary, startLine: firstAddLine },
          });
        }

        (file.comments || []).forEach(c => {
          allAnnotations.push({
            side: 'additions',
            lineNumber: c.startLine,
            metadata: { kind: 'review', ...c },
          });
        });

        for (const c of getUserLineComments(file.path)) {
          allAnnotations.push({
            side: c.side || 'additions',
            lineNumber: c.line,
            metadata: {
              kind: 'user-line',
              id: c.id,
              type: 'comment',
              text: c.text,
              startLine: c.line,
              createdAt: c.createdAt,
            },
          });
        }

        new FileDiff({
          theme: 'pierre-dark',
          diffStyle: 'split',
          diffIndicators: 'bars',
          lineDiffType: 'word-alt',
          disableBackground: true,
          disableLineNumbers: true,
          overflow: 'scroll',
          unsafeCSS: `
            pre, code, span, [data-line] {
              font-family: 'Berkeley Mono', 'SF Mono', monospace !important;
              font-size: 18px !important;
              line-height: 24px !important;
              font-feature-settings: "liga" 0, "calt" 0 !important;
              font-variant-ligatures: none !important;
            }
          `,
          renderAnnotation: (ann) => {
            const c = ann.metadata;

            if (c.kind === 'user-line') {
              const div = document.createElement('div');
              div.className = 'annotation';
              div.dataset.id = c.id;
              div.innerHTML = `
                <div class="annotation-comment">
                  <div class="annotation-header">
                    <span class="annotation-badge comment">Comment</span>
                  </div>
                  <div class="annotation-text" style="color: var(--text-primary);">${escapeHtml(c.text)}</div>
                </div>
              `;
              return div;
            }

            const stableId = (c.kind === 'review' || c.kind === 'summary')
              ? `${file.path}:${c.startLine}:${c.type}`
              : `${file.path}:${c.startLine}:${c.type}`;

            const label = {
              bug: 'Bug',
              warning: 'Warning',
              suggestion: 'Suggestion',
              good: 'Good',
              info: 'Summary',
            }[c.type] || c.type;

            const short = (c.text || '').length > 50 ? c.text.slice(0, 50) + '...' : (c.text || '');

            const div = document.createElement('div');
            div.className = 'annotation' + (isResolved(stableId) ? ' resolved' : '');
            div.dataset.id = stableId;
            div.innerHTML = `
              <div class="annotation-collapsed">
                <span class="annotation-badge ${escapeHtml(c.type)}">${escapeHtml(label)}</span>
                <span>${escapeHtml(short)}</span>
              </div>
              <div class="annotation-comment">
                <div class="annotation-header">
                  <span class="annotation-badge ${escapeHtml(c.type)}">${escapeHtml(label)}</span>
                </div>
                <div class="annotation-text">${escapeHtml(c.text || '')}</div>
                ${c.suggestedFix ? `<div class="annotation-text" style="margin-top: 8px; font-style: italic;"><strong>Fix:</strong> ${escapeHtml(c.suggestedFix)}</div>` : ''}
              </div>
              <div class="user-comments-container"></div>
              <div class="annotation-actions">
                <button class="resolve-btn">✓ Resolve</button>
              </div>
              <div class="annotation-reply-form">
                <input type="text" class="annotation-reply-input" placeholder="Add a comment..." />
                <button class="annotation-reply-btn">Send</button>
              </div>
            `;

            const input = div.querySelector('.annotation-reply-input');
            const sendBtn = div.querySelector('.annotation-reply-btn');
            const commentsContainer = div.querySelector('.user-comments-container');

            for (const reply of getUserRepliesForLine(file.path, c.startLine)) {
              const commentEl = document.createElement('div');
              commentEl.className = 'user-comment';
              commentEl.innerHTML = `
                <div class="user-comment-header">You</div>
                <div class="user-comment-text">${escapeHtml(reply.text)}</div>
              `;
              commentsContainer.appendChild(commentEl);
            }

            const submitReply = () => {
              const text = input.value.trim();
              if (!text) return;

              addUserComment({
                file: file.path,
                line: c.startLine,
                type: 'reply',
                original: (c.text || '').slice(0, 100),
                text: text,
              });

              const commentEl = document.createElement('div');
              commentEl.className = 'user-comment';
              commentEl.innerHTML = `
                <div class="user-comment-header">You</div>
                <div class="user-comment-text">${escapeHtml(text)}</div>
              `;
              commentsContainer.appendChild(commentEl);
              input.value = '';
            };

            sendBtn.addEventListener('click', submitReply);
            input.addEventListener('keydown', e => {
              if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitReply();
              }
            });

            div.querySelector('.resolve-btn')?.addEventListener('click', () => {
              div.classList.add('resolved');
              resolved.add(stableId);
              save();
              updateExportBtn();
            });

            div.querySelector('.annotation-collapsed')?.addEventListener('click', () => {
              div.classList.remove('resolved');
              resolved.delete(stableId);
              save();
              updateExportBtn();
            });

            return div;
          },
          onLineClick: (data) => {
            showCommentModal(file.path, data.lineNumber, data.side, renderDiff);
          },
        }).render({ fileDiff, containerWrapper: diffContainer, lineAnnotations: allAnnotations });
      };

      renderDiff();
    });

    // Keyboard nav
    let idx = 0;
    const sections = [...document.querySelectorAll('.file-section')];

    document.addEventListener('keydown', e => {
      const tag = e.target?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (e.key === 'j') {
        idx = Math.min(idx + 1, sections.length - 1);
        sections[idx]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (e.key === 'k') {
        idx = Math.max(idx - 1, 0);
        sections[idx]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (e.key === 'r') {
        const sec = sections[idx];
        if (sec) {
          sec.classList.toggle('collapsed');
          sec.querySelector('.toggle').textContent = sec.classList.contains('collapsed') ? '▶' : '▼';
        }
      }
    });
  </script>
</body>
</html>
